<!DOCTYPE html>
<html>
<head>
<title>India Agriculture Market</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌾 India Agriculture Market</h1>

<input type="text" id="search" placeholder="Search crop..." onkeyup="searchCrop()">

<table id="priceTable">
<tr>
<th>Crop</th>
<th>State</th>
<th>Price (₹)</th>
</tr>
</table>

<h2>🧪 Fertilizer Shop</h2>

<div class="shop">
<div class="item">
<h3>Urea</h3>
<p>₹300</p>
<button>Buy</button>
</div>

<div class="item">
<h3>DAP</h3>
<p>₹1200</p>
<button>Buy</button>
</div>
</div>

<h2>👨‍🌾 Sell Your Crop</h2>

<input type="text" placeholder="Your Name"><br><br>
<input type="text" placeholder="Crop Name"><br><br>
<input type="number" placeholder="Price"><br><br>

<button onclick="sellCrop()">Submit</button>

<script src="script.js"></script>

</body>
</html>
